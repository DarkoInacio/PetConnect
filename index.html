<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="description" content="PetConnect: conecta clínicas veterinarias con dueños. Reservas, mapa y ficha de salud de tu mascota." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f7668" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d9488" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>PetConnect</title>
    <!-- Aplica el tema guardado antes del primer paint para evitar flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('petconnect-theme');
          var resolved = t === 'dark' ? 'dark' : t === 'light' ? 'light' : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.classList.add(resolved);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
